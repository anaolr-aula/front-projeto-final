<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes da Sugestão</title>
    <link rel="stylesheet" href="../css/detalhe-sugestao.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <div id="imagem">
            <img src="../imagens/Logo_cortada.png" alt="Logo do sistema">
        </div>
        <h2>Detalhes da Sugestão</h2>
    </header>

    <div id="dashboard">
        <aside id="painel">
            <div id="usuario">
                <div id="img-usuario">
                    <i class="fa-solid fa-user"></i>
                </div>
                <span>Gestor</span>
                <span id="nome-sidebar">Nome do usuário</span>
            </div>

            <nav id="ferramentas">
                <div class="link-menu">
                    <i class="fa-solid fa-user"></i>
                    <a href="./perfil-gestor.html">Perfil</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-chart-line"></i>
                    <a href="./dashboard-gestor.html">Dashboard</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-bell"></i>
                    <a href="./notificacoes.html">Notificações</a>
                </div>
            </nav>

            <button id="btn-logout" type="button" onclick="window.location.href='../pages/login.html'">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </button>
        </aside>

        <main id="content-detalhes">
            <form id="form-sugestao">
                <div class="info">
                    <h3>Título</h3>
                    <input type="text" id="titulo" readonly>
                </div>

                <div class="info">
                    <h3>Descrição</h3>
                    <textarea id="descricao" rows="5" readonly></textarea>
                </div>

                <div class="info-grid">
                    <div class="info">
                        <h3>Setor de origem</h3>
                        <input type="text" id="setor_origem" readonly>
                    </div>

                    <div class="info">
                        <h3>Benefício esperado</h3>
                        <input type="text" id="beneficio_esperado" readonly>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info">
                        <h3>Autor</h3>
                        <input type="text" id="autor" readonly>
                    </div>

                    <div class="info">
                        <h3>Data de envio</h3>
                        <input type="text" id="data_envio" readonly>
                    </div>
                </div>

                <div class="info-grid">
                    <div class="info">
                        <h3>Votos</h3>
                        <input type="text" id="votos" readonly>
                    </div>

                    <div class="info">
                        <h3>Status</h3>
                        <select id="status">
                            <option value="enviada">Enviada</option>
                            <option value="em_analise">Em análise</option>
                            <option value="aprovada">Aprovada</option>
                            <option value="rejeitada">Rejeitada</option>
                        </select>
                    </div>
                </div>

                <div class="info">
                    <h3>Parecer do gestor</h3>
                    <textarea id="parecer_gestor" rows="4" placeholder="Digite o parecer do gestor"></textarea>
                </div>

                <p id="mensagem-sugestao" aria-live="polite"></p>

                <button id="btn-salvar" type="submit">Salvar alterações</button>
            </form>
        </main>
    </div>

    <script src="../js/detalhe-sugestao.js"></script>
</body>
</html>
