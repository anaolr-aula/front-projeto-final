<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="../css/cadastro-usuario.css" />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
</head>
<body>
    <header>
        <div id="imagem">
            <img src="../imagens/Logo_cortada.png" alt="Logo" />
        </div>
        <h2>Cadastro de Usuário</h2>
    </header>

    <div id="dashboard">
        <aside id="painel">
            <div id="usuario-box">
                <div id="img-usuario">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <span>Administrador</span>
                <span id="nome-sidebar">Nome do usuário</span>
            </div>

            <nav id="ferramentas">
                <div class="link-menu">
                    <i class="fa-solid fa-user"></i>
                    <a href="./perfil-admin.html">Perfil</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-user-plus"></i>
                    <a href="./cadastro-usuario.html">Cadastro</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-chart-line"></i>
                    <a href="./dashboard-admin.html">Dashboard</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-bell"></i>
                    <a href="./notificacoes-admin.html">Notificações</a>
                </div>
            </nav>

            <button
                id="btn-logout"
                type="button"
                onclick="window.location.href='../pages/login.html'"
            >
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </button>
        </aside>

        <main id="content-cadastro">
            <h1>Cadastro de Usuários</h1>

            <form id="form-cadastro-usuario">
                <div class="cards-container">
                    <section class="dados">
                        <h2>Dados básicos</h2>

                        <label for="nome">Nome completo:</label>
                        <input type="text" id="nome" name="nome" required />

                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required />

                        <label for="matricula">Matrícula:</label>
                        <input type="text" id="matricula" name="matricula" required />

                        <label for="cargo">Cargo:</label>
                        <input type="text" id="cargo" name="cargo" required />

                        <label for="setor">Setor:</label>
                        <select id="setor" name="setor" required>
                            <option value="">Selecione...</option>
                            <option value="RH">RH</option>
                            <option value="TI">TI</option>
                            <option value="Manutenção">Manutenção</option>
                            <option value="Produção">Produção</option>
                            <option value="Administrativo">Administrativo</option>
                            <option value="Recepção">Recepção</option>
                            <option value="Segurança">Segurança</option>
                            <option value="Limpeza">Limpeza</option>
                        </select>
                    </section>

                    <section class="dados">
                        <h2>Acesso ao sistema</h2>

                        <label for="tipo_usuario">Tipo de usuário:</label>
                        <select id="tipo_usuario" name="tipo_usuario" required>
                            <option value="">Selecione...</option>
                            <option value="funcionario">Funcionário</option>
                            <option value="gestor">Gestor</option>
                            <option value="admin">Administrador</option>
                        </select>

                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required />

                        <label for="confirmar_senha">Confirmar senha:</label>
                        <input
                            type="password"
                            id="confirmar_senha"
                            name="confirmar_senha"
                            required
                        />
                    </section>
                </div>

                <p id="mensagem-cadastro" aria-live="polite"></p>

                <div id="buttons">
                    <button type="submit" class="btn-salvar">
                        <i class="fa-solid fa-save"></i>
                        Salvar
                    </button>

                    <button type="button" class="btn-cancelar" id="btn-cancelar">
                        <i class="fa-solid fa-times"></i>
                        Cancelar
                    </button>
                </div>
            </form>
        </main>
    </div>

    <script src="../js/cadastro-usuario.js"></script>
    <script src="../js/menu-mobile.js"></script>
</body>
</html>
