<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Funcionário</title>
    <link rel="stylesheet" href="../css/cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <div id="imagem">
            <img src="../imagens/Logo_cortada.png" alt="Logo">
        </div>
        <h2>Cadastro de Funcionário</h2>
    </header>

    <div id="dashboard">
        <aside id="painel">
            <div id="usuario-box">
                <div id="img-usuario">
                    <i class="fa-solid fa-user"></i>
                </div>
                <span>Gestor</span>
                <span>Nome do usuário</span>
            </div>

            <nav id="ferramentas">
                <div class="link-menu">
                    <i class="fa-solid fa-user"></i>
                    <a href="./perfil-gestor.html">Perfil</a>
                </div>

                   <div class="link-menu">
                    <i class="fa-solid fa-user-plus"></i>
                    <a href="#">Cadastro</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-chart-line"></i>
                    <a href="#">Dashboard</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-bell"></i>
                    <a href="./notificacoes.html">Notificações</a>
                </div>
            </nav>

            <button id="btn-logout" type="button" onclick="window.location.href='../pages/login.html'">
                <i class="fa-solid fa-right-from-bracket"></i>
                Logout
            </button>
        </aside>

        <main id="content-cadastro">
            <h1>Cadastro de Funcionários</h1>

            <form id="form-cadastro-funcionario">
                <div class="cards-container">
                    <section class="dados">
                        <h2>Dados básicos</h2>

                        <label for="nome">Nome completo:</label>
                        <input type="text" id="nome" name="nome" required>

                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required>

                        <label for="matricula">Matrícula:</label>
                        <input type="text" id="matricula" name="matricula" required>

                        <label for="cargo">Cargo:</label>
                        <input type="text" id="cargo" name="cargo" required>

                        <label for="departamento">Departamento:</label>
                        <input type="text" id="departamento" name="departamento" required>
                    </section>

                    <section class="dados">
                        <h2>Acesso ao sistema</h2>

                        <label for="tipo_usuario">Tipo de usuário:</label>
                        <select id="tipo_usuario" name="tipo_usuario" required>
                            <option value="">Selecione...</option>
                            <option value="funcionario">Funcionário</option>
                            <option value="gestor">Gestor</option>
                        </select>

                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required>

                        <label for="confirmar_senha">Confirmar senha:</label>
                        <input type="password" id="confirmar_senha" name="confirmar_senha" required>
                    </section>
                </div>

                <div id="buttons">
                    <button type="submit" class="btn-salvar">
                        <i class="fa-solid fa-save"></i>
                        Salvar
                    </button>

                    <button type="button" class="btn-cancelar">
                        <i class="fa-solid fa-times"></i>
                        Cancelar
                    </button>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
