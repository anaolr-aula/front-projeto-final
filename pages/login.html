<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SIGOS</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div id="imagem">
        <img src="../imagens/Logo_clara.png" alt="Logo do sistema SIGOS">
    </div>
    
    <div id="content-login">

        <form id="form-login">
            <div class="item-form">
                <label for="matricula">Matrícula:</label>
                <input type="text" name="matricula" placeholder="Digite sua matrícula" id="matricula" required>
            </div>

            <div class="item-form">
                <label for="senha">Senha:</label>
                <input type="password" name="senha" placeholder="Digite sua senha" id="senha" required>
            </div>

            <button type="submit">Acessar</button>

            <a href="#">Esqueceu sua senha? Clique aqui</a>
        </form>
    </div>
</body>
</html>
