<!-- redefinir-senha.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha - SIGOS</title>
    <link rel="stylesheet" href="../css/redefinir-senha.css">
</head>
<body>
    <main id="login-container">
        <div id="imagem">
            <img src="../imagens/Logo_clara.png" alt="Logo do sistema SIGOS">
        </div>

        <div id="content-login">
            <form id="form-nova-senha">
                <div class="item-form">
                    <label for="nova-senha">Nova senha</label>
                    <input
                        type="password"
                        id="nova-senha"
                        placeholder="Digite sua nova senha"
                        required
                    >
                </div>

                <div class="item-form">
                    <label for="confirmar-senha">Confirmar senha</label>
                    <input
                        type="password"
                        id="confirmar-senha"
                        placeholder="Confirme sua nova senha"
                        required
                    >
                </div>

                <p id="mensagem-senha" aria-live="polite"></p>

                <button type="submit">Redefinir senha</button>

                <a href="login.html">Voltar para o login</a>
            </form>
        </div>
    </main>

    <script src="../js/redefinir-senha.js"></script>
</body>
</html>
