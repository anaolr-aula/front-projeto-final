<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes</title>
    <link rel="stylesheet" href="../css/descricao.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <div id="imagem">
            <img src="../imagens/Logo_cortada.png" alt="Logo">
        </div>
        <h2>Detalhes da Solicitação</h2>
    </header>

    <div id="dashboard">
        <aside id="painel">
            <div id="usuario">
                <div id="img-usuario">
                    <i class="fa-solid fa-user"></i>
                </div>
                <span>Gestor</span>
                <span>Nome do usuário</span>
            </div>

            <nav id="ferramentas">
                <div class="link-menu">
                    <i class="fa-solid fa-user"></i>
                    <a href="#">Perfil</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-chart-line"></i>
                    <a href="#">Dashboard</a>
                </div>

                <div class="link-menu">
                    <i class="fa-solid fa-bell"></i>
                    <a href="#">Notificações</a>
                </div>
            </nav>

            <button id="btn-logout" type="button">
                <i class="fa-solid fa-right-from-bracket"></i>
                <a href="login.html">Logout</a>
            </button>
        </aside>

        <main id="content-detalhes">
            <div class="info">
                <h3>Título</h3>
                <input type="text" id="titulo" readonly>
            </div>

            <div class="info">
                <h3>Descrição</h3>
                <textarea id="descricao" rows="5" readonly></textarea>
            </div>

            <div class="info-grid">
                <div class="info">
                    <h3>Categoria</h3>
                    <input type="text" id="categoria" readonly>
                </div>

                <div class="info">
                    <h3>Setor</h3>
                    <input type="text" id="setor" readonly>
                </div>
            </div>

            <div class="info-grid">
                <div class="info">
                    <h3>Local</h3>
                    <input type="text" id="local" readonly>
                </div>

                <div class="info">
                    <h3>Urgência</h3>
                    <input type="text" id="urgencia" readonly>
                </div>
            </div>

            <div class="info">
                <h3>Anexo</h3>
                <img id="preview-anexo" src="" alt="Anexo da ocorrência">
            </div>

            <div class="info-grid">
                <div class="info">
                    <h3>Status</h3>
                    <select id="status">
                        <option value="aberta">Aberta</option>
                        <option value="em_analise">Em análise</option>
                        <option value="em_andamento">Em andamento</option>
                        <option value="concluida">Concluída</option>
                    </select>
                </div>

                <div class="info">
                    <h3>Prioridade</h3>
                    <select id="prioridade">
                        <option value="">Selecione</option>
                        <option value="baixa">Baixa</option>
                        <option value="media">Média</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
            </div>

            <div class="info">
                <h3>Observação do gestor</h3>
                <textarea id="observacao_gestor" rows="4" placeholder="Digite uma observação"></textarea>
            </div>

            <button id="btn-salvar" type="button">Salvar alterações</button>
        </main>
    </div>

    <script src="../js/descricao.js"></script>
</body>
</html>
